version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: jobsimulator_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: jobsimulator_api
    ports:
      - "${APP_PORT}:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_PORT: ${APP_PORT}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: jobsimulator_frontend
    ports:
      - "8088:80"
    volumes:
      - ./frontend/public:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  postgres_data: